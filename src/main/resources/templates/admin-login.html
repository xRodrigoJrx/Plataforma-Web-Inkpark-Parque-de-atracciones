<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Admin | IncaPark</title>

  <!-- Bootstrap / FA / Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Andada+Pro:wght@400;600;700&family=Rye&display=swap" rel="stylesheet">

  <!-- CSS del proyecto -->
  <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>

<section class="min-vh-100 d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card border-0 shadow-lg">
          <div class="row g-0">
            <!-- Lado visual -->
            <div class="col-md-6 d-none d-md-block left-visual">
              <div class="visual-overlay d-flex flex-column justify-content-center align-items-center text-center p-4">
                <h2 class="mb-3" style="font-family:'Rye',serif;">
                  Panel <span class="text-gold">Admin</span>
                </h2>
                <p class="small mb-4">Acceso exclusivo para el equipo de IncaPark.</p>
                <div class="visual-img-wrapper">
                  <img src="/images/Portada.png" th:src="@{/images/Portada.png}" alt="InkaPark Portada" class="img-fluid rounded shadow-sm">
                </div>
              </div>
            </div>

            <!-- Formulario -->
            <div class="col-md-6">
              <div class="card-body p-5">
                <div class="text-center mb-4">
                  <h3 class="mb-1" style="font-family:'Andada Pro',serif;">Iniciar sesión (Admin)</h3>
                  <p class="text-muted small mb-0">Ingresa tus credenciales administrativas</p>
                </div>

                <!-- IMPORTANTE: coincide con el controlador @PostMapping("/admin/login") -->
                <form class="needs-validation" novalidate th:action="@{/admin/login}" method="post">
                  <!-- Si luego habilitas Spring Security, deja esta línea -->
                  <input th:if="${_csrf != null}" type="hidden"
                         th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                  <div class="mb-3">
                    <label for="correo" class="form-label">Usuario (correo)</label>
                    <input type="email" id="correo" name="correo" class="form-control"
                           placeholder="admin@incapark.com" required autocomplete="username">
                    <div class="invalid-feedback">Ingresa tu correo.</div>
                  </div>

                  <div class="mb-3">
                    <label for="contrasena" class="form-label">Contraseña</label>
                    <div class="input-group">
                      <input type="password" id="contrasena" name="contrasena" class="form-control"
                             placeholder="••••••••" required autocomplete="current-password">
                      <button class="btn btn-outline-secondary password-toggle" type="button"
                              data-target="contrasena" aria-label="Mostrar contraseña">
                        <i class="fa-solid fa-eye"></i>
                      </button>
                      <div class="invalid-feedback">La contraseña es obligatoria.</div>
                    </div>
                  </div>

                  <div class="d-grid gap-2">
                    <button class="btn btn-inca btn-lg" type="submit">
                      <i class="fa-solid fa-right-to-bracket me-2"></i> Entrar
                    </button>
                    <a class="btn btn-outline-secondary" href="/" th:href="@{/}">
                      <i class="fa-solid fa-arrow-left-long me-2"></i> Volver al inicio
                    </a>
                  </div>

                  <!-- Mensaje de error desde el controlador -->
                  <div th:if="${error}" class="alert alert-danger mt-3 py-2" th:text="${error}">
                    Credenciales inválidas o sin permiso.
                  </div>
                </form>

              </div>
            </div>
          </div><!-- row -->
        </div><!-- card -->
      </div>
    </div>
  </div>
</section>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js?v=1" th:src="@{/js/main.js(v=1)}"></script>
</body>
</html>
