name: CD - Inkapark

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar código
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configurar Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Compilar proyecto (sin tests para evitar errores de BD)
      - name: Build project
        run: mvn clean package -DskipTests

      # 4. Ejecutar aplicación Spring Boot (modo CI seguro)
      - name: Run Spring Boot Application
        run: java -jar target/*.jar