name: CI - Inkapark

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar código
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configurar Java 21 (IMPORTANTE PARA TU POM)
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Cache Maven (opcional pero mejora velocidad)
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      # 4. Compilar proyecto
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 5. Ejecutar tests (si no fallan)
      - name: Run tests
        run: mvn test